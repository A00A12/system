name: Daily WordPress Scraper

on:
  schedule:
    # 每天北京时间中午 12:00 自动运行 (UTC 时间 4:00)
    - cron: '0 4 * * *'
  workflow_dispatch: # 这个选项允许你在 GitHub 网页上随时手动点击运行

jobs:
  scrape-and-backup:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出当前代码库
        uses: actions/checkout@v3

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装 requests 请求库
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 4. 运行爬虫脚本抓取网页
        run: python scrape.py

      - name: 5. 提交最新网页并保存记录到 GitHub
        run: |
          git config --global user.name "GitHub Actions Auto Backup"
          git config --global user.email "actions@github.com"
          git add backup.html
          # 如果网页内容相比昨天没有变化，就不会产生空提交报错
          git diff --quiet && git diff --staged --quiet || git commit -m "自动备份网页更新: $(date +'%Y-%m-%d')"
          git push
