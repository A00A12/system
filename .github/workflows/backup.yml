name: Daily WordPress Scraper

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# 🌟 必须加这一段，给机器人写入代码的权限
permissions:
  contents: write

jobs:
  scrape-and-backup:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出当前代码库
        uses: actions/checkout@v3

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装 requests 请求库
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 4. 运行爬虫脚本抓取网页
        run: python scrape.py

      - name: 5. 提交最新网页并保存记录到 GitHub
        run: |
          git config --global user.name "GitHub Actions Auto Backup"
          git config --global user.email "actions@github.com"
          
          # 🌟 这里把原来的 backup.html 改成了点（.），意思是把 backups 文件夹里所有的新文件都存起来
          git add .
          
          # 检查是否有内容更新，有才提交
          git diff --quiet && git diff --staged --quiet || git commit -m "自动备份网页更新: $(date +'%Y-%m-%d')"
          git push
